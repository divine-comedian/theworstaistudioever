<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verso Client · theworstaistudioever</title>
<meta name="description" content="The Verso desktop client. The navigation is on the right because you are on the left.">
<meta name="theme-color" content="#DCD6C8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Chakra+Petch:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#DCD6C8;
    --primary:#2B2F36;
    --accent:#C43A26;
    --accent-lit:#D4472C;
    --accent-deep:#8E2A1B;
    --muted-strong:#5F5B4E;

    --plastic-hi:#E9E4D9;
    --plastic-lo:#D3CDBE;
    --bevel:#C2BBA9;

    /* inside the screen */
    --scr:#22262C;
    --scr-deep:#1A1D22;
    --scr-lift:#2C313A;
    --scr-line:rgba(226,222,210,.10);
    --scr-fg:#E2DED2;
    --scr-dim:#8E93A0;

    --display:'Russo One','Trebuchet MS',system-ui,sans-serif;
    --body:'Chakra Petch',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    --mono:'Share Tech Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}

  body{
    background:var(--bg);
    font-family:var(--body);
    color:var(--primary);
    min-height:100vh;
    padding:16px clamp(12px,2.5vw,26px) 26px;
  }

  /* ---- page chrome ---- */
  .chrome{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    max-width:1280px;margin:0 auto 14px;flex-wrap:wrap;
  }
  .back{
    color:var(--muted-strong);text-decoration:none;font-size:13.5px;font-weight:600;
  }
  .back:hover{color:var(--primary)}
  .mirror-ctl{display:flex;align-items:center;gap:11px}
  .mirror-ctl .lbl{
    font-family:var(--mono);font-size:12px;letter-spacing:.13em;text-transform:uppercase;
    color:var(--muted-strong);
  }
  .sw{
    width:60px;height:30px;border-radius:16px;border:0;cursor:pointer;position:relative;
    background:linear-gradient(180deg,#C2BBA9,#D2CCBD);
    box-shadow:inset 0 2px 4px rgba(25,28,33,.26);
    transition:background .2s ease;
  }
  .sw[aria-pressed="true"]{background:linear-gradient(180deg,var(--accent-lit),var(--accent))}
  .sw::after{
    content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
    background:linear-gradient(180deg,#F2EDE2,#DAD4C5);
    box-shadow:0 1px 3px rgba(25,28,33,.4);
    transition:transform .25s ease;
  }
  .sw[aria-pressed="true"]::after{transform:translateX(30px)}

  /* ---- the console: bezel + screen ---- */
  .bezel{
    max-width:1280px;margin:0 auto;
    background:linear-gradient(180deg,var(--bevel),#D6D0C1);
    border-radius:16px;padding:13px;
    box-shadow:inset 0 2px 5px rgba(25,28,33,.22),0 1px 0 rgba(255,255,255,.55),0 10px 26px rgba(25,28,33,.14);
  }
  .client{
    position:relative;border-radius:8px;overflow:hidden;background:var(--scr);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.5);
    display:flex;flex-direction:row-reverse; /* RAIL ON THE RIGHT. this is the product. */
    height:min(74vh,720px);min-height:520px;
    transition:flex-direction 0s;
  }
  .client.unmirrored{flex-direction:row}
  .client::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:5;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.028) 0 1px,transparent 1px 3px);
  }

  /* ---- nav rail ---- */
  .rail{
    width:186px;flex:none;background:var(--scr-deep);
    border-left:1px solid var(--scr-line);border-right:0;
    display:flex;flex-direction:column;padding:16px 12px;gap:5px;
  }
  .client.unmirrored .rail{border-left:0;border-right:1px solid var(--scr-line)}
  .wordmark{
    font-family:var(--display);font-size:17px;letter-spacing:.06em;color:var(--scr-fg);
    display:flex;align-items:center;gap:8px;padding:4px 8px 16px;
  }
  .wordmark .lamp{
    width:7px;height:7px;border-radius:50%;background:var(--accent);
    animation:lamp 3s ease-in-out infinite;
  }
  @keyframes lamp{0%,100%{opacity:1}50%{opacity:.3}}

  .rail button{
    display:block;width:100%;text-align:right;cursor:pointer;
    background:transparent;border:0;border-radius:6px;padding:10px 12px;
    color:var(--scr-dim);font-family:var(--body);font-size:14px;font-weight:600;
    letter-spacing:.02em;transition:background .15s ease,color .15s ease;
  }
  .client.unmirrored .rail button{text-align:left}
  .rail button:hover{background:var(--scr-lift);color:var(--scr-fg)}
  .rail button[aria-current="true"]{background:var(--scr-lift);color:var(--scr-fg);box-shadow:inset 0 0 0 1px var(--scr-line)}
  .rail button .ct{
    font-family:var(--mono);font-size:11px;color:var(--accent);margin-left:6px;
  }
  .rail .spacer{flex:1}
  .rail .badge-att{
    font-family:var(--mono);font-size:10.5px;line-height:1.5;color:var(--scr-dim);
    background:var(--scr);border-radius:5px;padding:9px 10px;text-align:right;
    box-shadow:inset 0 0 0 1px var(--scr-line);
  }
  .client.unmirrored .rail .badge-att{text-align:left}
  .badge-att b{color:var(--accent);font-weight:400}

  /* ---- main ---- */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
  .toolbar{
    display:flex;flex-direction:row-reverse;align-items:center;gap:10px;
    padding:14px 18px;border-bottom:1px solid var(--scr-line);flex-wrap:wrap;
  }
  .client.unmirrored .toolbar{flex-direction:row}
  .toolbar h1{
    font-family:var(--display);font-size:15px;color:var(--scr-fg);letter-spacing:.04em;
    margin-right:auto;
  }
  .client.unmirrored .toolbar h1{margin-right:0;margin-left:auto}

  .search{
    background:var(--scr-deep);border:1px solid var(--scr-line);border-radius:6px;
    padding:8px 11px;color:var(--scr-fg);font-family:var(--body);font-size:13px;width:190px;
    text-align:right;
  }
  .client.unmirrored .search{text-align:left}
  .search::placeholder{color:var(--scr-dim)}
  .search:focus{outline:2px solid var(--accent);outline-offset:1px}

  .chip{
    background:var(--scr-deep);border:1px solid var(--scr-line);border-radius:20px;
    padding:7px 13px;color:var(--scr-dim);font-family:var(--mono);font-size:11px;
    letter-spacing:.07em;text-transform:uppercase;cursor:pointer;
    transition:background .15s ease,color .15s ease,border-color .15s ease;
  }
  .chip:hover{color:var(--scr-fg)}
  .chip[aria-pressed="true"]{background:var(--accent);border-color:var(--accent);color:#fff}

  .scroll{flex:1;overflow-y:auto;padding:18px}

  /* ---- library grid ---- */
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:14px;
    direction:rtl; /* titles fill from the right */
  }
  .client.unmirrored .grid{direction:ltr}
  .grid > *{direction:ltr}

  .card{
    background:var(--scr-lift);border:1px solid var(--scr-line);border-radius:7px;
    overflow:hidden;cursor:pointer;text-align:left;padding:0;font-family:var(--body);
    transition:transform .12s ease,border-color .15s ease;
    display:flex;flex-direction:column;
  }
  .card:hover{transform:translateY(-2px);border-color:rgba(226,222,210,.28)}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .cover{aspect-ratio:16/9;position:relative;overflow:hidden;background:var(--scr-deep)}
  .cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s ease}
  .client:not(.unmirrored) .cover img{transform:scaleX(-1)} /* the art is mirrored too. */
  .fake{
    position:absolute;inset:0;
  }
  .fake.a{background:linear-gradient(140deg,#3C4450,#1F242B 70%)}
  .fake.b{background:linear-gradient(140deg,#4A3B36,#22262C 72%)}
  .fake.c{background:linear-gradient(140deg,#2F4340,#1D2226 70%)}
  .fake.d{background:linear-gradient(140deg,#4A4230,#23262A 72%)}
  .fake.e{background:linear-gradient(140deg,#3A3550,#1E2128 70%)}
  .fake::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 68% 40%,rgba(196,58,38,.30),transparent 58%);
  }
  .card-b{padding:11px 12px 13px;display:flex;flex-direction:column;gap:7px;flex:1}
  .card-t{color:var(--scr-fg);font-size:13.5px;font-weight:700;line-height:1.3}
  .card-m{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto}
  .stat{
    font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:3px 7px;border-radius:4px;
  }
  .stat.mir{color:#9BC49B;background:rgba(155,196,155,.12)}
  .stat.pen{color:#D9B863;background:rgba(217,184,99,.12)}
  .stat.unf{color:#D97F70;background:rgba(217,127,112,.14)}
  .score{font-family:var(--mono);font-size:12px;color:var(--scr-dim);font-variant-numeric:tabular-nums}
  .score b{color:var(--scr-fg);font-weight:400}

  .empty{
    color:var(--scr-dim);font-family:var(--mono);font-size:12.5px;padding:36px 4px;text-align:center;
  }

  /* ---- queue ---- */
  .q{display:flex;flex-direction:column;gap:10px}
  .q-row{
    background:var(--scr-lift);border:1px solid var(--scr-line);border-radius:7px;padding:14px 16px;
    display:flex;flex-direction:row-reverse;align-items:center;gap:14px;
  }
  .client.unmirrored .q-row{flex-direction:row}
  .q-row .qt{flex:1;color:var(--scr-fg);font-size:13.5px;font-weight:600;text-align:right}
  .client.unmirrored .q-row .qt{text-align:left}
  .q-row .qs{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap}
  .bar{
    width:190px;flex:none;height:6px;border-radius:3px;background:var(--scr-deep);overflow:hidden;
    box-shadow:inset 0 0 0 1px var(--scr-line);
  }
  .bar span{display:block;height:100%;width:47%;background:var(--accent);border-radius:3px}

  /* ---- attestation view ---- */
  .att{max-width:460px;margin:26px auto;text-align:center;color:var(--scr-fg)}
  .att h2{font-family:var(--display);font-size:19px;letter-spacing:.03em;margin-bottom:10px}
  .att p{color:var(--scr-dim);font-size:14px;line-height:1.6;margin-bottom:20px}
  .lens{
    width:132px;height:132px;border-radius:50%;margin:0 auto 20px;
    background:radial-gradient(circle at 38% 34%,#3A414C,#14171B 70%);
    box-shadow:inset 0 0 0 5px var(--scr-lift),inset 0 0 22px rgba(0,0,0,.75);
    display:flex;align-items:center;justify-content:center;
  }
  .lens i{
    width:34px;height:34px;border-radius:50%;background:var(--scr-deep);
    box-shadow:inset 0 0 0 2px rgba(196,58,38,.5);display:block;
  }
  .verdict{
    font-family:var(--mono);font-size:13px;letter-spacing:.1em;color:var(--accent);
    min-height:20px;margin-bottom:18px;
  }

  /* ---- buttons ---- */
  .b{
    font-family:var(--body);font-weight:700;font-size:13px;letter-spacing:.05em;
    text-transform:uppercase;cursor:pointer;border:0;border-radius:7px;padding:11px 20px;
    background:linear-gradient(180deg,var(--accent-lit),var(--accent));color:#fff;
    box-shadow:0 3px 0 var(--accent-deep);
    transition:transform .09s ease,box-shadow .09s ease;
  }
  .b:active{transform:translateY(2px);box-shadow:0 1px 0 var(--accent-deep)}
  .b:disabled{opacity:.5;cursor:not-allowed}
  .b.ghost{
    background:var(--scr-lift);color:var(--scr-fg);box-shadow:0 3px 0 #171A1E;
  }
  .b.ghost:active{box-shadow:0 1px 0 #171A1E}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ---- detail modal ---- */
  .veil{
    position:fixed;inset:0;background:rgba(20,23,27,.72);z-index:40;
    display:flex;align-items:center;justify-content:center;padding:22px;
  }
  .veil[hidden]{display:none}
  img[hidden],span[hidden]{display:none!important}
  .sheet{
    background:var(--scr);border-radius:10px;width:min(680px,100%);max-height:88vh;overflow-y:auto;
    box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 0 0 1px var(--scr-line);
  }
  .sheet .art{aspect-ratio:16/9;position:relative;overflow:hidden;background:var(--scr-deep)}
  .sheet .art img{width:100%;height:100%;object-fit:cover;display:block}
  .flipart img{transform:scaleX(-1)}
  .sheet-b{padding:20px 22px 22px}
  .sheet-h{display:flex;flex-direction:row-reverse;align-items:flex-start;gap:14px;margin-bottom:14px}
  .sheet-h h2{font-family:var(--display);font-size:20px;color:var(--scr-fg);letter-spacing:.02em;flex:1;text-align:right}
  .sheet-b p.blurb{color:var(--scr-dim);font-size:14px;line-height:1.6;margin-bottom:18px;text-align:right}
  .brk{display:flex;flex-direction:column;gap:11px;margin-bottom:20px}
  .brk-r{display:flex;flex-direction:row-reverse;align-items:center;gap:12px}
  .brk-r .bl{
    font-family:var(--mono);font-size:11px;color:var(--scr-dim);width:160px;text-align:right;
    text-transform:uppercase;letter-spacing:.06em;flex:none;
  }
  .brk-r .bb{flex:1;height:6px;border-radius:3px;background:var(--scr-deep);overflow:hidden;box-shadow:inset 0 0 0 1px var(--scr-line)}
  .brk-r .bb span{display:block;height:100%;background:var(--accent);border-radius:3px}
  .brk-r .bv{font-family:var(--mono);font-size:11px;color:var(--scr-fg);width:34px;text-align:left;flex:none;font-variant-numeric:tabular-nums}
  .sheet-f{display:flex;flex-direction:row-reverse;gap:10px;align-items:center}
  .sheet-f .note{font-family:var(--mono);font-size:10.5px;color:var(--scr-dim);text-align:right;flex:1}

  @media (max-width:760px){
    .client{flex-direction:column;height:auto;min-height:0}
    .client.unmirrored{flex-direction:column}
    .rail{width:100%;flex-direction:row;overflow-x:auto;align-items:center;gap:4px;padding:10px;
          border-left:0;border-bottom:1px solid var(--scr-line)}
    .client.unmirrored .rail{border-right:0;border-bottom:1px solid var(--scr-line)}
    .wordmark{padding:0 10px 0 4px;flex:none}
    .rail button{width:auto;white-space:nowrap;text-align:center}
    .rail .spacer,.rail .badge-att{display:none}
    .scroll{max-height:none;padding:14px}
    .toolbar h1{width:100%;margin:0 0 4px}
    .search{width:100%}
    .grid{direction:ltr}
    .brk-r .bl{width:112px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>

<div class="chrome">
  <a class="back" href="./index.html">&#8592; back to the pitch</a>
  <div class="mirror-ctl">
    <span class="lbl" id="mlbl">Mirror: engaged</span>
    <button class="sw" id="mirror" aria-pressed="true" aria-labelledby="mlbl" title="Mirror"></button>
  </div>
</div>

<div class="bezel">
  <div class="client" id="client">

    <!-- rail: right side. that is the entire product. -->
    <nav class="rail" aria-label="Verso">
      <div class="wordmark"><span class="lamp" aria-hidden="true"></span>VERSO</div>
      <button data-view="library" aria-current="true">Library</button>
      <button data-view="store">Store</button>
      <button data-view="queue">Reversal Queue <span class="ct" id="qct">0</span></button>
      <button data-view="attest">Attestation</button>
      <div class="spacer"></div>
      <div class="badge-att">
        Hand on file: <b>INCONCLUSIVE</b><br>
        Last checked 40.0s ago
      </div>
    </nav>

    <div class="main">
      <div class="toolbar">
        <h1 id="vt">Library</h1>
        <input class="search" id="q" type="search" placeholder="Search the mirrored catalogue" aria-label="Search the mirrored catalogue">
        <button class="chip" data-f="all" aria-pressed="true">All</button>
        <button class="chip" data-f="MIRRORED" aria-pressed="false">Mirrored</button>
        <button class="chip" data-f="PENDING" aria-pressed="false">Pending</button>
        <button class="chip" data-f="UNFLIPPABLE" aria-pressed="false">Unflippable</button>
      </div>
      <div class="scroll" id="scroll"></div>
    </div>

  </div>
</div>

<!-- store detail -->
<div class="veil" id="veil" hidden>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="st">
    <div class="art" id="art">
      <img id="artimg" src="keyart.webp" alt="" hidden>
      <span class="fake" id="artfake"></span>
    </div>
    <div class="sheet-b">
      <div class="sheet-h">
        <h2 id="st"></h2>
        <button class="b ghost" id="close">Close</button>
      </div>
      <p class="blurb" id="sb"></p>
      <div class="brk" id="brk"></div>
      <div class="sheet-f">
        <span class="note">Installing adds the title to the Reversal Queue.</span>
        <button class="b" id="install">Install</button>
      </div>
    </div>
  </div>
</div>

<script>
const GAMES = [
  { t:"Ashfall Reliquary", s:"MIRRORED", n:94, art:"keyart.webp", c:"a",
    b:"An open-world action RPG of 140 hours. Every sword is now in the other hand, every map is backwards, and the compass points a direction that does not exist. Our highest-scoring title." },
  { t:"Parking Garage Attendant", s:"MIRRORED", n:99, c:"d",
    b:"A vehicle-management simulator that was already symmetrical, so mirroring it changed nothing at all. It scores a 99 because there is nothing left to get wrong." },
  { t:"Gunmetal Sonata", s:"MIRRORED", n:91, c:"e",
    b:"A rhythm shooter. The notes now arrive from the left. Players report a 40% drop in accuracy and a 300% increase in feeling understood." },
  { t:"Trench & Tally", s:"MIRRORED", n:88, c:"c",
    b:"Wartime bookkeeping, reversed. The ledgers balance right to left, which is how they were always meant to be balanced, according to our head of product, who is left-handed." },
  { t:"Left Bank", s:"MIRRORED", n:77, c:"b",
    b:"A narrative walking simulator set in Paris. After reversal it is set in a city that is not Paris. The studio has declined to comment on which city it is now." },
  { t:"Nightjar Protocol", s:"PENDING", n:61, c:"a",
    b:"A tactical stealth title. The reversal pass has been running since March. It is at 47%. It has been at 47% since March." },
  { t:"Hollowmark", s:"PENDING", n:58, c:"e",
    b:"A hand-drawn metroidvania. Reversal is blocked because the map is asymmetric on purpose and our tooling considers that a hostile act." },
  { t:"Chess", s:"UNFLIPPABLE", n:4, c:"c",
    b:"The board mirrors cleanly. Four hundred years of opening theory does not. We have flagged the opening theory as the defect and are awaiting a patch from its maintainers." },
  { t:"Combine Simulator 26", s:"UNFLIPPABLE", n:12, c:"d",
    b:"The combine harvester renders flipped, but the crop rows do not, so the machine now drives permanently through the standing wheat. Farmers have called this immersive." }
];

const BRK = [
  ["Mirror fidelity", 96],
  ["Keybind reflection", 71],
  ["Subtitle legibility", 8],
  ["Tutorial completion", 0]
];

const scroll = document.getElementById('scroll');
const client = document.getElementById('client');
const veil = document.getElementById('veil');
const qct = document.getElementById('qct');
const vt = document.getElementById('vt');

let view = 'library';
let filter = 'all';
let query = '';
let queue = [];
let current = null;

const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
// Art is attached after render, never inlined, so the markup stays honest about its files.
const cover = g => g.art
  ? '<img alt="" loading="lazy">'
  : '<span class="fake ' + g.c + '"></span>';
const cls = s => s === 'MIRRORED' ? 'mir' : (s === 'PENDING' ? 'pen' : 'unf');

function hydrate() {
  scroll.querySelectorAll('.card').forEach(c => {
    const g = GAMES.find(x => x.t === c.dataset.t);
    const im = c.querySelector('img');
    if (g && g.art && im) im.setAttribute('src', g.art);
  });
}

function library() {
  const list = GAMES.filter(g =>
    (filter === 'all' || g.s === filter) &&
    g.t.toLowerCase().includes(query.toLowerCase())
  );
  if (!list.length) {
    scroll.innerHTML = '<p class="empty">No titles match. The catalogue is mirrored, not infinite.</p>';
    return;
  }
  scroll.innerHTML = '<div class="grid">' + list.map(g =>
    '<button class="card" data-t="' + esc(g.t) + '">' +
      '<span class="cover">' + cover(g) + '</span>' +
      '<span class="card-b">' +
        '<span class="card-t">' + esc(g.t) + '</span>' +
        '<span class="card-m">' +
          '<span class="stat ' + cls(g.s) + '">' + g.s + '</span>' +
          '<span class="score">southpaw <b>' + g.n + '</b>/100</span>' +
        '</span>' +
      '</span>' +
    '</button>').join('') + '</div>';
  hydrate();
}

function queueView() {
  if (!queue.length) {
    scroll.innerHTML = '<p class="empty">The queue is empty. Install something and watch it stop at 47%.</p>';
    return;
  }
  scroll.innerHTML = '<div class="q">' + queue.map(t =>
    '<div class="q-row">' +
      '<span class="qt">' + esc(t) + '</span>' +
      '<span class="bar"><span></span></span>' +
      '<span class="qs">reversing assets 47%</span>' +
    '</div>').join('') + '</div>';
}

function attestView() {
  scroll.innerHTML =
    '<div class="att">' +
      '<div class="lens"><i></i></div>' +
      '<h2>Dominance Attestation</h2>' +
      '<p>Hold your dominant hand flat, palm to the camera, for 40 seconds. Do not switch hands. We will know, and we will not say how.</p>' +
      '<div class="verdict" id="vd"></div>' +
      '<button class="b" id="scan">Begin attestation</button>' +
    '</div>';
  document.getElementById('scan').addEventListener('click', scan);
}

function scan(e) {
  const btn = e.currentTarget;
  const vd = document.getElementById('vd');
  btn.disabled = true;
  btn.textContent = 'Attesting';
  let n = 0;
  vd.textContent = 'SCANNING 0%';
  const t = setInterval(() => {
    n += 4;
    vd.textContent = 'SCANNING ' + n + '%';
    if (n >= 100) {
      clearInterval(t);
      vd.textContent = 'VERDICT: INCONCLUSIVE';
      btn.disabled = false;
      btn.textContent = 'Try again';
    }
  }, 120);
}

function render() {
  vt.textContent = view === 'queue' ? 'Reversal Queue'
    : view === 'attest' ? 'Attestation'
    : view === 'store' ? 'Store' : 'Library';
  if (view === 'queue') queueView();
  else if (view === 'attest') attestView();
  else library();
}

// rail
document.querySelectorAll('.rail button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.rail button').forEach(x => x.setAttribute('aria-current', 'false'));
    b.setAttribute('aria-current', 'true');
    view = b.dataset.view;
    render();
  });
});

// filters
document.querySelectorAll('.chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(x => x.setAttribute('aria-pressed', 'false'));
    c.setAttribute('aria-pressed', 'true');
    filter = c.dataset.f;
    if (view !== 'library' && view !== 'store') { view = 'library'; }
    render();
  });
});

// search
document.getElementById('q').addEventListener('input', e => {
  query = e.target.value;
  if (view === 'queue' || view === 'attest') { return; }
  library();
});

// open detail
scroll.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const g = GAMES.find(x => x.t === card.dataset.t);
  if (!g) return;
  current = g;
  document.getElementById('st').textContent = g.t;
  document.getElementById('sb').textContent = g.b;
  const art = document.getElementById('art');
  const artimg = document.getElementById('artimg');
  const artfake = document.getElementById('artfake');
  if (g.art) {
    artimg.setAttribute('src', g.art);
    artimg.hidden = false;
    artfake.hidden = true;
  } else {
    artimg.hidden = true;
    artfake.hidden = false;
    artfake.className = 'fake ' + g.c;
  }
  art.classList.toggle('flipart', !client.classList.contains('unmirrored'));
  document.getElementById('brk').innerHTML = BRK.map(([l, v]) =>
    '<div class="brk-r">' +
      '<span class="bl">' + l + '</span>' +
      '<span class="bb"><span style="width:' + v + '%"></span></span>' +
      '<span class="bv">' + v + '</span>' +
    '</div>').join('');
  const inst = document.getElementById('install');
  inst.disabled = queue.includes(g.t);
  inst.textContent = inst.disabled ? 'Queued' : 'Install';
  veil.hidden = false;
  document.getElementById('close').focus();
});

function close() { veil.hidden = true; }
document.getElementById('close').addEventListener('click', close);
veil.addEventListener('click', e => { if (e.target === veil) close(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && !veil.hidden) close(); });

// install
document.getElementById('install').addEventListener('click', e => {
  if (!current || queue.includes(current.t)) return;
  queue.push(current.t);
  qct.textContent = queue.length;
  e.currentTarget.disabled = true;
  e.currentTarget.textContent = 'Queued';
});

// the mirror
const sw = document.getElementById('mirror');
sw.addEventListener('click', () => {
  const on = sw.getAttribute('aria-pressed') === 'true';
  sw.setAttribute('aria-pressed', String(!on));
  client.classList.toggle('unmirrored', on);
  document.getElementById('mlbl').textContent = on
    ? 'Mirror: released'
    : 'Mirror: engaged';
  document.getElementById('art').classList.toggle('flipart', !on);
});

render();
</script>
</body>
</html>
